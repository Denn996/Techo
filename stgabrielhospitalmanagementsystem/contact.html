<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - St Gabriel Hospital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; background-color: #0d253f; color: #fff; }
        .logo-container { display: flex; align-items: center; }
        .logo-container img { width: 50px; margin-right: 10px; }
        .logo-container .hospital-name { font-weight: 700; font-size: 1.5rem; }
        .nav-links a { margin-left: 20px; color: #fff; text-decoration: none; font-weight: 500; }
        .nav-links a:hover, .nav-links a.active { color: #00bfff; }
        .btn-primary { background-color: #00bfff; padding: 8px 15px; border-radius: 5px; color: #fff; font-weight: 600; text-decoration: none; }
        .btn-primary:hover { background-color: #009acd; }

        .hero { text-align: center; padding: 80px 20px; background-color: #808080; color: #fff; }
        .hero h1 { font-size: 2.5rem; }
        .hero p { font-size: 1.2rem; }

        .contact-form { max-width: 500px; margin: 50px auto; background: #f9f5ee; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        .contact-form button { background-color: #00bfff; color: #fff; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: 600; }
        .contact-form button:hover { background-color: #009acd; }
    </style>
</head>
<body>

<header class="navbar">
    <div class="logo-container">
        <img src="logo.png" alt="Hospital Logo">
        <span class="hospital-name">St. Gabriel's Hospital</span>
    </div>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="staff.html">Staff</a>
        <a href="patients.html">Patients</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="login.html" class="btn-primary">Login</a>
    </nav>
</header>

<section class="hero">
    <h1>Contact Us</h1>
    <p>Reach out to us for appointments or inquiries.</p>
</section>

<section>
    <form class="contact-form" action="backend/contact.php" method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</section>

</body>
</html>
